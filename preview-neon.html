<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Li Weiyi · Neon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap" rel="stylesheet">
  <script src="data/works.js?v=20260524-archive"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #060608;
      --fg:    #e8e4dc;
      --dim:   #3a3830;
      --acid:  #c8f542;   /* acid yellow-green */
      --glow:  rgba(200,245,66,0.15);
    }

    html, body {
      background: var(--bg); color: var(--fg); overflow-x: hidden;
    }
    body { font-family: 'Inter', sans-serif; cursor: none; }

    /* ── Custom cursor ── */
    #cur {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 10px; height: 10px;
      background: var(--acid);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: transform 0.08s;
      box-shadow: 0 0 12px var(--acid), 0 0 30px var(--glow);
    }
    #cur-trail {
      position: fixed; z-index: 9998; pointer-events: none;
      width: 40px; height: 40px;
      border: 1px solid rgba(200,245,66,0.3);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: left 0.14s ease, top 0.14s ease;
    }
    body:has(a:hover) #cur { transform: translate(-50%,-50%) scale(2); }
    body:has(a:hover) #cur-trail { opacity: 0; }

    /* ── Nav ── */
    .nav {
      position: fixed; inset: 0 0 auto; z-index: 100;
      padding: 0 48px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,6,8,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,245,66,0.1);
    }
    .nav-brand {
      font-weight: 900; font-size: 12px; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none; color: var(--fg);
    }
    .nav-brand span { color: var(--acid); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      text-decoration: none; color: var(--dim);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--acid); }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 120px 48px 80px;
      position: relative; overflow: hidden;
    }
    /* grid lines */
    #hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(200,245,66,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,66,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-tag {
      font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--acid); margin-bottom: 32px; font-weight: 700;
    }
    .hero-name {
      font-weight: 900;
      font-size: clamp(64px, 12vw, 180px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 48px;
      position: relative; z-index: 1;
    }
    .hero-name .line2 {
      color: transparent;
      -webkit-text-stroke: 1px var(--acid);
      /* glow on outline */
      filter: drop-shadow(0 0 8px rgba(200,245,66,0.5));
    }

    .hero-bottom {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 40px; position: relative; z-index: 1;
    }
    .hero-tagline {
      max-width: 480px;
      font-size: 13px; line-height: 1.8; color: rgba(232,228,220,0.5);
      font-weight: 300;
      border-left: 2px solid var(--acid); padding-left: 18px;
    }
    .hero-data {
      text-align: right;
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--dim); line-height: 2.5;
    }

    /* ── Works grid ── */
    #works { padding: 100px 48px 120px; }

    .works-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 56px;
      border-bottom: 1px solid rgba(200,245,66,0.12); padding-bottom: 24px;
    }
    .works-head h2 {
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--acid);
    }
    .works-head span { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .work-card {
      position: relative; overflow: hidden;
      aspect-ratio: 3/4;
      background: var(--dim);
      text-decoration: none; color: inherit;
      cursor: none;
    }
    .work-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s ease, filter 0.4s ease;
      filter: saturate(0.7) brightness(0.75);
    }
    .work-card:hover img {
      transform: scale(1.04);
      filter: saturate(1) brightness(0.9);
    }
    .work-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(6,6,8,0.92) 40%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 24px;
    }
    /* acid border on hover */
    .work-card::after {
      content: '';
      position: absolute; inset: 0;
      border: 1.5px solid var(--acid);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .work-card:hover::after { opacity: 1; }
    /* acid glow */
    .work-card:hover { box-shadow: 0 0 30px var(--glow); }

    .wc-cat {
      font-size: 8.5px; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--acid); margin-bottom: 8px; font-weight: 700;
    }
    .wc-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 300; font-style: italic; line-height: 1.2;
      color: var(--fg);
    }
    .wc-year {
      font-size: 9px; color: var(--dim); margin-top: 6px;
      letter-spacing: 0.1em;
    }
    .wc-arrow {
      position: absolute; top: 20px; right: 20px;
      font-size: 18px; color: var(--acid);
      opacity: 0; transform: translate(-4px,4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .work-card:hover .wc-arrow { opacity: 1; transform: translate(0,0); }

    /* ── About ── */
    #about {
      padding: 100px 48px;
      border-top: 1px solid rgba(200,245,66,0.1);
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    }
    .about-left {
      position: relative;
    }
    .about-large {
      font-weight: 900; font-size: clamp(60px,9vw,130px);
      line-height: 0.9; letter-spacing: -0.04em; text-transform: uppercase;
    }
    .about-large .outlined {
      color: transparent; -webkit-text-stroke: 1px rgba(200,245,66,0.4);
    }
    .about-badge {
      display: inline-block; margin-top: 28px;
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--bg); background: var(--acid);
      padding: 4px 12px;
    }
    .about-right p {
      font-size: 13.5px; line-height: 1.9; color: rgba(232,228,220,0.55);
      font-weight: 300; margin-bottom: 28px;
    }
    .about-right .contact {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--acid); text-decoration: none;
      border-bottom: 1px solid rgba(200,245,66,0.3); padding-bottom: 2px;
    }

    /* ── Footer ── */
    footer {
      padding: 28px 48px;
      border-top: 1px solid rgba(200,245,66,0.08);
      display: flex; justify-content: space-between;
    }
    footer p { font-size: 9.5px; color: var(--dim); letter-spacing: 0.14em; }

    /* ── Reveal ── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.in { opacity: 1; transform: none; }
  </style>
</head>
<body>

  <div id="cur"></div>
  <div id="cur-trail"></div>

  <nav class="nav">
    <a class="nav-brand" href="#">Li <span>Weiyi</span></a>
    <ul class="nav-links">
      <li><a href="#">Works</a></li>
      <li><a href="#">Archive</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">中文</a></li>
    </ul>
  </nav>

  <section id="hero">
    <p class="hero-tag">Artist · Beijing · b. 2008</p>
    <h1 class="hero-name">
      LI<br>
      <span class="line2">WEIYI</span>
    </h1>
    <div class="hero-bottom">
      <p class="hero-tagline" id="tagline"></p>
      <div class="hero-data">
        <span>Painting</span>
        <span>Sculpture</span>
        <span>Installation</span>
        <span>Beijing, 2025</span>
      </div>
    </div>
  </section>

  <section id="works">
    <div class="works-head">
      <h2>Selected Works</h2>
      <span id="wcount"></span>
    </div>
    <div class="works-grid" id="works-grid"></div>
  </section>

  <section id="about">
    <div class="about-left reveal">
      <div class="about-large">
        LI<br><span class="outlined">WEI</span><br>YI
      </div>
      <span class="about-badge">b. 2008 · Beijing</span>
    </div>
    <div class="about-right reveal">
      <p id="bio"></p>
      <a class="contact" href="#" id="contact-link"></a>
    </div>
  </section>

  <footer>
    <p id="yr"></p>
    <p>li-weiyi.com</p>
  </footer>

  <script>
    const D = SITE_DATA;
    const cur      = document.getElementById('cur');
    const curTrail = document.getElementById('cur-trail');

    document.addEventListener('mousemove', e => {
      cur.style.left      = e.clientX + 'px';
      cur.style.top       = e.clientY + 'px';
      curTrail.style.left = e.clientX + 'px';
      curTrail.style.top  = e.clientY + 'px';
    });

    document.getElementById('tagline').textContent      = D.artist.tagline;
    document.getElementById('bio').textContent          = D.artist.bio;
    document.getElementById('yr').textContent           = `© ${new Date().getFullYear()} Li Weiyi`;
    document.getElementById('contact-link').textContent = D.artist.contact;
    document.getElementById('contact-link').href        = `mailto:${D.artist.contact}`;

    const featured = D.works.filter(w => w.featured);
    document.getElementById('wcount').textContent = `${featured.length} works, 2024–2025`;

    document.getElementById('works-grid').innerHTML = featured.map((w, i) => `
      <a class="work-card reveal" href="work.html?id=${w.id}">
        <img src="${w.heroImage}" alt="${w.title}" loading="lazy">
        <div class="work-card-overlay">
          <p class="wc-cat">${w.category}</p>
          <h2 class="wc-title">${w.title}</h2>
          <p class="wc-year">${w.year}</p>
        </div>
        <span class="wc-arrow">↗</span>
      </a>
    `).join('');

    const io = new IntersectionObserver(es => es.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('in');
    }), { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
</body>
</html>
