<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Li Weiyi · 李惟祎</title>
  <meta name="description" content="Li Weiyi — Artist working across painting, drawing, sculpture and installation. Beijing, b. 2008.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor-dot"></div>
  <div id="cursor-aura"></div>

  <!-- Site navigation -->
  <nav class="site-nav">
    <a class="site-nav-brand" href="index.html">
      <span class="en">Li Weiyi</span>
      <span class="zh">李惟祎</span>
    </a>
    <div class="site-nav-links">
      <a class="site-nav-link active" href="index.html">
        <span class="en">Works</span>
        <span class="zh">作品</span>
      </a>
      <a class="site-nav-link" href="archive.html">
        <span class="en">Archive</span>
        <span class="zh">归档</span>
      </a>
    </div>
    <button id="lang-toggle" aria-label="Switch language">中文</button>
  </nav>

  <!-- Side navigation dots -->
  <nav id="sidenav" aria-label="Section navigation"></nav>

  <!-- ═══ HERO ═══════════════════════════════════════════════════ -->
  <section id="hero">
    <div class="hero-content">
      <span class="hero-eyebrow"></span>
      <h1 class="hero-name"></h1>
      <p class="hero-tagline"></p>
    </div>
    <div class="hero-photo-wrap">
      <img id="hero-photo" class="hero-photo" alt="Li Weiyi 李惟祎"
           onerror="this.parentElement.style.opacity='0'">
    </div>
    <p class="hero-scroll">
      <span class="en">Scroll to view works</span>
      <span class="zh">向下浏览作品</span>
    </p>
  </section>

  <!-- ═══ WORKS (rendered by JS from data/works.js) ══════════════ -->
  <div id="works-container"></div>

  <!-- ═══ ABOUT ══════════════════════════════════════════════════ -->
  <section id="about">
    <span class="about-idx reveal">—</span>
    <div class="reveal">
      <p class="about-label">
        <span class="en">About</span>
        <span class="zh">关于</span>
      </p>
      <p class="about-statement"></p>
    </div>
    <div class="about-meta reveal"></div>
  </section>

  <!-- ═══ FOOTER ═════════════════════════════════════════════════ -->
  <footer>
    <span class="footer-name"></span>
    <span class="footer-year"></span>
  </footer>

  <!-- Data config (edit this file to add/update works) -->
  <script src="data/works.js"></script>
  <!-- Main script -->
  <script src="js/main.js"></script>

</body>
</html>
